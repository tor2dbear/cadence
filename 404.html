<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Cadence — not found</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<style>
:root{
  --bg:#0b0c0e; --ink:#e8eaed; --ink-dim:#9aa1ab; --ink-faint:#626873; --line:#282c32;
  --panel:#141619; --accent:#8ad0c6; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:grid;place-items:center;padding:24px;text-align:center}
.wrap{max-width:420px}
.mark{width:44px;height:44px;margin:0 auto 22px;display:block}
.code{font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px}
h1{font-size:22px;margin:0 0 10px;font-weight:650}
p{color:var(--ink-dim);margin:0 0 26px}
.home{display:inline-block;font-family:var(--mono);font-size:13px;text-decoration:none;color:#0b0c0e;
  background:var(--accent);border-radius:9px;padding:9px 16px;font-weight:600;
  transition:transform .2s cubic-bezier(.22,1,.36,1), filter .2s ease}
.home:hover{transform:translateY(-1px);filter:brightness(1.08)}
</style>
</head>
<body>
<div class="wrap">
  <img class="mark" src="favicon.svg" alt="" width="44" height="44" />
  <p class="code">Error · 404</p>
  <h1>This page isn’t part of the system</h1>
  <p>The scale you’re looking for doesn’t resolve here. Head back and compose one.</p>
  <a class="home" href="/">→ back to cadence</a>
</div>
</body>
</html>
